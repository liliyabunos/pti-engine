[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "Dockerfile",
  "pyproject.toml",
  "start_pipeline.sh",
  "perfume_trend_sdk/jobs/",
  "perfume_trend_sdk/analysis/",
  "perfume_trend_sdk/resolvers/",
  "perfume_trend_sdk/ingest/",
  "perfume_trend_sdk/services/",
  "scripts/",
  "configs/",
]

[deploy]
startCommand = "sh start_pipeline.sh"
cronSchedule = "0 11 * * *"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
