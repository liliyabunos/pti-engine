<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delina Parfums de Marly for women</title>
</head>
<body>
  <div id="col1">
    <!-- Perfume name -->
    <h1 itemprop="name">Delina</h1>

    <!-- Brand link (mirrors actual Fragrantica pattern) -->
    <p>by <a href="/designers/parfums-de-marly.html">Parfums de Marly</a></p>

    <!-- Gender and year -->
    <p>for women, 2017</p>

    <!-- Rating (schema.org microdata pattern) -->
    <div itemscope itemtype="http://schema.org/AggregateRating">
      <span itemprop="ratingValue">4.28</span>
      out of
      <span itemprop="ratingCount">1842</span>
      votes
    </div>

    <!-- Main accords section -->
    <div class="accord-box">
      <div class="accord-bar" style="width:85%"></div>
      <div class="accord-name">floral</div>
    </div>
    <div class="accord-box">
      <div class="accord-bar" style="width:60%"></div>
      <div class="accord-name">musky</div>
    </div>
    <div class="accord-box">
      <div class="accord-bar" style="width:55%"></div>
      <div class="accord-name">white floral</div>
    </div>
    <div class="accord-box">
      <div class="accord-bar" style="width:40%"></div>
      <div class="accord-name">sweet</div>
    </div>

    <!-- Notes pyramid -->
    <div id="pyramid">
      <div class="notes-section">
        <h4>Top Notes</h4>
        <div class="note-item"><span>Rhubarb</span></div>
        <div class="note-item"><span>Turkish Rose</span></div>
        <div class="note-item"><span>Lychee</span></div>
      </div>
      <div class="notes-section">
        <h4>Middle Notes</h4>
        <div class="note-item"><span>Peony</span></div>
        <div class="note-item"><span>Rose</span></div>
        <div class="note-item"><span>Gardenia</span></div>
      </div>
      <div class="notes-section">
        <h4>Base Notes</h4>
        <div class="note-item"><span>Musk</span></div>
        <div class="note-item"><span>Cashmere Wood</span></div>
        <div class="note-item"><span>Ambrette</span></div>
      </div>
    </div>

  </div>
</body>
</html>
